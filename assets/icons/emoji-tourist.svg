<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- background circle -->
  <circle cx="18" cy="18" r="17" fill="#a78bfa" stroke="#fff" stroke-width="1.5"/>
  <!-- camera body -->
  <rect x="8" y="14" width="20" height="14" rx="2.5" fill="#fff"/>
  <!-- camera lens -->
  <circle cx="18" cy="21" r="5" fill="#a78bfa"/>
  <circle cx="18" cy="21" r="3" fill="#7c3aed"/>
  <circle cx="18" cy="21" r="1.2" fill="#fff" opacity="0.5"/>
  <!-- viewfinder bump -->
  <rect x="15" y="11" width="6" height="4" rx="1.5" fill="#fff"/>
  <!-- flash -->
  <rect x="9" y="15" width="3" height="2" rx="0.5" fill="#a78bfa"/>
</svg>
